name: GenGrabber
options:
  bundleIdPrefix: com.gengrabber
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.2"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  GenGrabber:
    type: application
    platform: macOS
    sources:
      - path: GenGrabber
        excludes:
          - Tests
    info:
      path: GenGrabber/Info.plist
      properties:
        CFBundleIconFile: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gengrabber.GenGrabber
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
  GenGrabberTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: GenGrabber/Tests
    dependencies:
      - target: GenGrabber
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gengrabber.GenGrabberTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GenGrabber.app/Contents/MacOS/GenGrabber"
        BUNDLE_LOADER: "$(TEST_HOST)"
